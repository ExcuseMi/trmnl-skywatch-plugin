---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'yes'
static_data: ''
polling_verb: get
framework_version: 
serverless_language: 
polling_url: 'https://trmnl.bettens.dev/skywatch?lat={{ trmnl.plugin_settings.custom_fields_values.lat | default: 51.5074 }}&lon={{ trmnl.plugin_settings.custom_fields_values.lon | default: -0.1278 }}&address={{ trmnl.plugin_settings.custom_fields_values.address | url_encode }}&show_ground={{ trmnl.plugin_settings.custom_fields_values.show_ground | url_encode }}&route_display={{ trmnl.plugin_settings.custom_fields_values.route_display | default: "codes" }}'
polling_headers: ''
polling_body: 
id: 286469
custom_fields:
- keyname: author_info
  name: About SkyWatch
  field_type: author_bio
  description: |-
    Live aircraft radar within 50 nm (~90 km / 55 mi), updated every 15 minutes. <a href="https://github.com/ExcuseMi/trmnl-skywatch-plugin/blob/main/GUIDE.md" target="_blank">How to read the display →</a>
    <br /><br /><strong>Labels</strong><br /> Callsign · aircraft type · altitude · speed. Brightness reflects altitude. Emergency squawks flagged automatically.
    <br /><br /><strong>Routes</strong><br /> Origin → destination labels powered by <a href="https://www.adsbdb.com" target="_blank">adsbdb.com</a>. Progress bar shows position along the route.
    <br /><br /><strong>Airports</strong><br /> Large and medium airports marked with crosshair and IATA code. <a href="https://github.com/ExcuseMi/trmnl-skywatch-plugin/blob/main/AIRPORTS.md" target="_blank">Full airport list →</a> · <a href="https://github.com/ExcuseMi/trmnl-skywatch-plugin/blob/main/GUIDE.md" target="_blank">Display guide →</a>
    <br /><br /><strong>Data sources</strong><br /> ADS-B signals via <a href="https://airplanes.live" target="_blank">airplanes.live</a>, <a href="https://adsb.lol" target="_blank">adsb.lol</a>, <a href="https://adsb.fi" target="_blank">adsb.fi</a>, and <a href="https://adsb.one" target="_blank">adsb.one</a> · Airport data via <a href="https://ourairports.com" target="_blank">OurAirports</a> · Route data via <a href="https://www.adsbdb.com" target="_blank">adsbdb.com</a> · Icons by <a href="https://adsb-radar.com/" target="_blank">ADS-B Radar</a>  github_url: https://github.com/ExcuseMi/trmnl-skywatch-plugin
  learn_more_url: https://github.com/ExcuseMi/trmnl-skywatch-plugin/blob/main/GUIDE.md
  category: travel
  help_text: TRMNL X Ready
- keyname: address
  field_type: string
  name: Location / Address
  description: City or address to centre the radar on.<br />Takes priority over Latitude / Longitude if both are set.
  help_text: e.g. "London, UK" or "Central Park, NY"
  placeholder: London, UK
  group: Location
  optional: true
- keyname: lat
  field_type: string
  name: Latitude
  description: Centre latitude for the radar view.<br />Only used when no Address is set.<br />Find your coordinates at <a href="https://www.latlong.net" target="_blank">latlong.net</a>.
  help_text: e.g. 51.5074 (London) · 40.7128 (New York)
  placeholder: '51.5074'
  group: Location
  optional: true
- keyname: lon
  field_type: string
  name: Longitude
  description: Centre longitude for the radar view.<br />Only used when no Address is set.
  help_text: e.g. -0.1278 (London) · -74.0060 (New York)
  placeholder: "-0.1278"
  group: Location
  optional: true
- keyname: unit
  field_type: select
  name: Measurement Units
  description: Unit system for speed and altitude.<br />Metric — km/h and metres.<br />Imperial — knots and feet.
  options:
  - Metric (km/h, m): metric
  - Imperial (kt, ft): imperial
  default: imperial
  optional: true
- keyname: route_display
  field_type: select
  name: Route Label Style
  description: How to display flight origin → destination on aircraft labels.
  options:
  - Airport codes (AMS → LHR): codes
  - City names (AMSTERDAM (NL) → LONDON (GB)): cities
  - Hide route label: hidden
  default: codes
  optional: true
- keyname: show_ground
  field_type: boolean
  name: Show Ground Traffic
  description: Include aircraft currently on the ground, such as those taxiing or parked at airports.
  default: 'false'
  optional: true
name: SkyWatch
refresh_interval: 15
