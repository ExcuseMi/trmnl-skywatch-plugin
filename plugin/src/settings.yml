---
strategy: polling
no_screen_padding: 'yes'
dark_mode: 'yes'
static_data: ''
polling_verb: get
framework_version: 
serverless_language: 
polling_url: 'https://trmnl.bettens.dev/skywatch?lat={{ trmnl.plugin_settings.custom_fields_values.lat | default: 51.5074 }}&lon={{ trmnl.plugin_settings.custom_fields_values.lon | default: -0.1278 }}&address={{ trmnl.plugin_settings.custom_fields_values.address | url_encode }}&show_ground={{ trmnl.plugin_settings.custom_fields_values.show_ground | url_encode }}'
polling_headers: ''
polling_body: 
id: 286469
custom_fields:
- keyname: author_info
  name: About SkyWatch
  field_type: author_bio
  description: Real-time aircraft radar on your TRMNL display.<br />Live map with 36 type-specific aircraft icons — from A320s to helicopters.<br />Icon brightness and label shading indicate altitude at a glance.<br />Emergency squawks (hijack · no radio · Mayday) are flagged automatically.<br />Powered by <strong>airplanes.live</strong><br />Icons by <a href="https://adsb-radar.com/" target="_blank">ADS-B Radar</a><br /><br /><a href="https://github.com/ExcuseMi/trmnl-skywatch-plugin/blob/main/ICONS.md" target="_blank">Icon guide</a>
  github_url: https://github.com/ExcuseMi/trmnl-skywatch-plugin
  category: travel
  help_text: TRMNL X Ready
- keyname: address
  field_type: string
  name: Location / Address
  description: Enter your city or address. Leave blank to use Latitude/Longitude instead.
  help_text: e.g. "London, UK" or "Central Park, NY"
  placeholder: London, UK
  optional: true
- keyname: lat
  field_type: string
  name: Latitude
  description: Center latitude for your radar view. Find yours at <a href="https://www.latlong.net" target="_blank">latlong.net</a>.
  help_text: Decimal degrees · e.g. 51.5074 (London) · 40.7128 (New York)
  placeholder: '51.5074'
  optional: true
- keyname: lon
  field_type: string
  name: Longitude
  description: Center longitude for your radar view. Find yours at <a href="https://www.latlong.net" target="_blank">latlong.net</a>.
  help_text: Decimal degrees · e.g. -0.1278 (London) · -74.006 (New York)
  placeholder: "-0.1278"
  optional: true
- keyname: unit
  field_type: select
  name: Measurement Units
  description: Unit system used for speed, altitude, and distance.
  options:
  - Metric (km/h, m, km): metric
  - Imperial (knots, ft, nm): imperial
  default: imperial
  optional: true
- keyname: show_ground
  field_type: boolean
  name: Show Ground Traffic
  description: Include aircraft that are currently on the ground.
  default: 'false'
  optional: true
name: SkyWatch
refresh_interval: 15
