version: '3.8'
services:
  skywatch-proxy:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skywatch-proxy
    env_file: .env
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - ENABLE_IP_WHITELIST=${ENABLE_IP_WHITELIST:-false}
    volumes:
      - ./data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
