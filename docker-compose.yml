version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: skywatch-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  skywatch-proxy:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skywatch-proxy
    env_file: .env
    volumes:
      - ./providers.yml:/app/providers.yml:ro
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - ENABLE_IP_WHITELIST=${ENABLE_IP_WHITELIST:-false}
      - REDIS_URL=redis://redis:6379
      - USER_AGENT=${USER_AGENT:-TRMNL-Skywatch-Plugin/1.0}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
